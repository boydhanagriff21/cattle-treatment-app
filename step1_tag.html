<!DOCTYPE html>
<html>
<head>
    <title>Step 1: Tag Number</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #c9a0a0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .phone-frame {
            width: 375px;
            height: 667px;
            background: linear-gradient(135deg, #a56b6b 0%, #8b5555 100%);
            border-radius: 30px;
            padding: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border: 8px solid #222;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .phone-notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 25px;
            background: #222;
            border-radius: 0 0 15px 15px;
            z-index: 10;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 100%;
            max-height: 90%;
            overflow-y: auto;
        }
        .step-indicator {
            text-align: center;
            color: #8B4653;
            font-weight: bold;
            margin-bottom: 10px;
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 25px;
            font-size: 1.4em;
        }
        .icon {
            text-align: center;
            font-size: 3em;
            margin-bottom: 15px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: #555;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 1em;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }
        .button-group {
            display: flex;
            gap: 8px;
            margin-top: 25px;
        }
        button, .back-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        button[type="submit"] {
            background: #4CAF50;
            color: white;
        }
        button[type="submit"]:hover {
            background: #45a049;
            transform: translateY(-2px);
        }
        .back-btn {
            background: #f0f0f0;
            color: #333;
        }
        .back-btn:hover {
            background: #e0e0e0;
        }
        .hint {
            color: #888;
            font-size: 0.85em;
            margin-top: 5px;
        }
        @media (max-width: 600px) {
            .phone-frame {
                width: 100%;
                height: auto;
                min-height: 600px;
                border: 4px solid #222;
            }
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="phone-notch"></div>
        <div class="container">
        <div class="step-indicator">STEP 1 OF 3</div>
        <div class="icon">🏷️</div>
        <h1>Enter Cattle Tag Number</h1>
        
        <form method="POST" action="{{ url_for('step2') }}">
            <div class="form-group">
                <label for="tag_number">Tag Number:</label>
                <input type="text" 
                       id="tag_number" 
                       name="tag_number" 
                       placeholder="e.g., 1234 or A-567" 
                       value="{{ tag_number if tag_number else '' }}"
                       required 
                       autofocus>
                <p class="hint">Enter the unique identification number for this animal</p>
            </div>
            
            <div class="button-group">
                <a href="{{ url_for('index') }}" class="back-btn">← Cancel</a>
                <button type="submit">Next Step →</button>
            </div>
        </form>
    </div>
    </div>
</body>
</html>
