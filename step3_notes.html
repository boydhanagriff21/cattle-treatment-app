<!DOCTYPE html>
<html>
<head>
    <title>Enter Notes</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #c9a0a0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .phone-frame {
            width: 375px;
            height: 667px;
            background: linear-gradient(135deg, #a56b6b 0%, #8b5555 100%);
            border-radius: 30px;
            padding: 15px;
            border: 8px solid #222;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            height: 100%;
        }
        h1 {
            text-align: center;
            margin-bottom: 10px;
        }
        .herd {
            text-align: center;
            font-weight: bold;
            margin-bottom: 15px;
            color: #8B4653;
        }
        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }
        textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            margin-top: 8px;
            font-size: 1em;
            border-radius: 6px;
            border: 1px solid #ccc;
        }
        button {
            margin-top: 25px;
            width: 100%;
            padding: 12px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
        }
        button:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="container">
            <h1>Step 3: Notes</h1>

            <div class="herd">Herd: {{ herd }}</div>

            <p><strong>Tag Number:</strong> {{ tag_number }}</p>
            <p><strong>Medicine:</strong> {{ medicine }}</p>

            <form method="POST" action="{{ url_for('summary') }}">
                <label for="notes">Notes (optional)</label>
                <textarea name="notes" id="notes" placeholder="Injection site, condition, etc."></textarea>

                <button type="submit">Save Treatment</button>
            </form>
        </div>
    </div>
</body>
</html>
