<!DOCTYPE html>
<html>
<head>
    <title>Treatment Summary</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #c9a0a0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .phone-frame {
            width: 375px;
            height: 667px;
            background: linear-gradient(135deg, #a56b6b 0%, #8b5555 100%);
            border-radius: 30px;
            padding: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border: 8px solid #222;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .phone-notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 25px;
            background: #222;
            border-radius: 0 0 15px 15px;
            z-index: 10;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 100%;
            max-height: 90%;
            overflow-y: auto;
        }
        .success-icon {
            text-align: center;
            font-size: 3.5em;
            margin-bottom: 15px;
            animation: bounce 0.5s;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        h1 {
            color: #4CAF50;
            text-align: center;
            margin-bottom: 8px;
            font-size: 1.4em;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 20px;
            font-size: 0.85em;
        }
        .summary-card {
            background: #f9f9f9;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 18px;
            margin-bottom: 20px;
        }
        .summary-row {
            margin-bottom: 15px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e0e0e0;
        }
        .summary-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .summary-label {
            color: #667eea;
            font-weight: bold;
            font-size: 0.8em;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        .summary-value {
            color: #333;
            font-size: 1.05em;
            word-wrap: break-word;
        }
        .notes-value {
            font-size: 0.95em;
            line-height: 1.5;
            white-space: pre-wrap;
        }
        .button-group {
            display: flex;
            gap: 8px;
            margin-top: 20px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 0.95em;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        .btn-primary {
            background: #4CAF50;
            color: white;
        }
        .btn-primary:hover {
            background: #45a049;
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: #2196F3;
            color: white;
        }
        .btn-secondary:hover {
            background: #0b7dda;
            transform: translateY(-2px);
        }
        .btn-outline {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }
        .btn-outline:hover {
            background: #f0f0ff;
        }
        @media (max-width: 600px) {
            .phone-frame {
                width: 100%;
                height: auto;
                min-height: 600px;
                border: 4px solid #222;
            }
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="phone-notch"></div>
        <div class="container">
        <div class="success-icon">✅</div>
        <h1>Treatment Saved Successfully!</h1>
        <p class="subtitle">Record #{{ treatment_id }} has been saved to the database</p>
        
        <div class="summary-card">
            <div class="summary-row">
                <div class="summary-label">Tag Number</div>
                <div class="summary-value">#{{ data.tag_number }}</div>
            </div>
            
            <div class="summary-row">
                <div class="summary-label">Medicine Administered</div>
                <div class="summary-value">{{ data.medicine }}</div>
            </div>
            
            <div class="summary-row">
                <div class="summary-label">Treatment Notes</div>
                <div class="summary-value notes-value">
                    {% if data.notes %}
                        {{ data.notes }}
                    {% else %}
                        <em style="color: #999;">No notes provided</em>
                    {% endif %}
                </div>
            </div>
        </div>
        
        <div class="button-group">
            <a href="{{ url_for('index') }}" class="btn btn-secondary">View All Records</a>
            <a href="{{ url_for('step1') }}" class="btn btn-primary">+ Add Another</a>
        </div>
    </div>
    </div>
</body>
</html>
